name: CI

# Enforces what SECURITY.md promises: tests plus the supply-chain policy
# (cargo deny check, the sole supply-chain gate — see the supply-chain job
# below for why cargo-audit is not used alongside it) run on every push and
# pull request, so a new or yanked/advisory-bearing dependency fails the
# build instead of slipping in.
#
# Two build/test jobs, split because the GUI is Windows-first and Slint's
# Linux backend needs system libs the ubuntu runner may lack:
#   - `test-non-gui` (ubuntu): builds/tests vaultcore + vaultctl + dumper only.
#   - `test-windows` (windows-latest): builds/tests the FULL workspace,
#     including vaultgui — the only job that actually compiles the
#     `#[cfg(windows)]` FFI + Slint + WinRT code.
#
# The memory-scraping proof (`bash verify/run.sh`) is Windows-only and needs
# MiniDump access, so it stays a documented MANUAL step rather than a CI gate.

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-non-gui:
    name: "build & test (non-GUI: core + CLI + dumper)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable, pinned by rust-version)
        run: rustup toolchain install stable --profile minimal
      # --locked: fail if Cargo.lock is out of date, preserving the committed pins.
      # Scoped to the non-GUI crates: vaultgui (Slint) is Windows-first and its
      # Linux backend needs system libs this runner may lack; see test-windows.
      - name: Build
        run: cargo build -p vaultcore -p vaultctl -p dumper --locked
      - name: Test
        run: cargo test -p vaultcore -p vaultctl -p dumper --locked
      # The `fuzzing` feature gates vault::fuzz_support (the legacy-v2 image
      # builder the fuzz targets are built on). Its oracle test must run on
      # stable too: if the builder ever stopped emitting a MAC-valid v2 image,
      # every libFuzzer case would bail at the MAC and the fuzz job would still
      # report "no crashes found" while exercising nothing.
      - name: Test (fuzz-support oracle)
        run: cargo test -p vaultcore --locked --features fuzzing --test fuzz_support_oracle

  test-windows:
    name: build & test (windows-latest, full workspace incl. vaultgui)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable, pinned by rust-version)
        run: rustup toolchain install stable --profile minimal
      # Full workspace, including vaultgui: this is the first job that actually
      # compiles the #[cfg(windows)] FFI + Slint + WinRT code.
      - name: Build
        run: cargo build --workspace --locked
      # vaultgui's tests are pure unit tests (no window is opened), so they run
      # headless here. The interactive memory-scraping harness (verify/run.sh)
      # is NOT run in CI — it stays a documented MANUAL step (see top of file).
      - name: Test
        run: cargo test --workspace --locked

  formal-verification:
    name: "kani (proofs: codec size arithmetic)"
    runs-on: ubuntu-latest
    # Ubuntu because Kani does not support Windows at all. On this host every
    # #[cfg(windows)] block compiles to its non-Windows stub, so these proofs
    # cover the platform-independent arithmetic ONLY. FFI is covered by the
    # manual procedures in VERIFICATION.md.
    steps:
      - uses: actions/checkout@v4
      - name: Downgrade rust-version for Kani
        run: sed -i 's/rust-version = "1.96"/rust-version = "1.93"/' Cargo.toml

      - name: Run Kani
        uses: model-checking/kani-github-action@v1
        with:
          # Pin to a release known to align with a supported nightly.
          # Bump deliberately when upgrading; do not use `latest` in CI.
          kani-version: 0.67.0
          command: cargo kani
          args: -p vaultcore
          
  fuzz:
    name: "fuzz (libFuzzer, 60s per target)"
    runs-on: ubuntu-latest
    # Ubuntu, not Windows: cargo-fuzz needs nightly and does not support
    # x86_64-pc-windows-msvc. No coverage is lost — every surface fuzzed here is
    # platform-independent parser code; the #[cfg(windows)] FFI is unreachable
    # from all three targets.
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly (required by cargo-fuzz)
        run: rustup toolchain install nightly --profile minimal
      - name: Cache cargo-fuzz binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || true
      # Carry the corpus between runs so coverage compounds across PRs instead of
      # each job restarting from zero. Without this, a 60s run barely gets past
      # the magic-number check.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      # Compile all targets first so a build break is reported as a build break
      # rather than as a fuzzing failure.
      - name: Build fuzz targets
        run: cargo +nightly fuzz build
      # -rss_limit_mb is an assertion, not a guardrail: the parser's core DoS
      # defense is that it never pre-allocates from an unvalidated length prefix,
      # so a regression there surfaces as an RSS blowup.
      # -timeout=10 catches hangs (unbounded parse loops).
      - name: Fuzz vault_header_parse
        run: cargo +nightly fuzz run vault_header_parse -- -max_total_time=60 -timeout=10 -rss_limit_mb=2048
      - name: Fuzz locked_vault_load
        run: cargo +nightly fuzz run locked_vault_load -- -max_total_time=60 -timeout=10 -rss_limit_mb=2048
      - name: Fuzz v2_to_v3_migration
        run: cargo +nightly fuzz run v2_to_v3_migration -- -max_total_time=60 -timeout=10 -rss_limit_mb=2048
      # On a crash, upload the reproducer so it can be minimized locally with
      # `cargo +nightly fuzz tmin <target> <artifact>`.
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  supply-chain:
    name: cargo deny check (sole supply-chain gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      # Advisories, license allow-list, wildcard bans, and registry restrictions
      # are all defined in deny.toml, and are the single source of truth here.
      #
      # cargo-audit is deliberately NOT run alongside this: it audits the
      # entire Cargo.lock with no target-scoping, so it would flag advisories
      # that deny.toml already handles honestly and with justification —
      # the three unmaintained Slint-stack crates (paste/rustybuzz/ttf-parser)
      # in `[advisories].ignore`, and the Linux/Wayland-only quick-xml
      # advisories that `[graph].targets` prunes because that subtree never
      # compiles into our Windows binary. Duplicating those into a
      # `cargo audit --ignore` list would be LESS honest: cargo-audit has no
      # way to express "not applicable on our target," only "ignore this
      # advisory everywhere."
      - name: cargo deny check
        run: cargo deny check
