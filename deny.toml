# cargo-deny supply-chain policy for the Zero-Trust Secrets Manager.
#
# Run locally / in CI:  cargo install cargo-deny && cargo deny check
# (Not run in the dev environment where the tools weren't installed; wire it
#  into CI so every dependency change is gated.)

[advisories]
version = 2
# Fail on any unpatched RUSTSEC advisory affecting the locked dependency graph.
yanked = "deny"
ignore = []

[bans]
# Prefer a single version of each crate; flag accidental duplicates.
multiple-versions = "warn"
# No wildcard ("*") version requirements — they defeat Cargo.lock pinning.
wildcards = "deny"
# Deny build/proc-macro crates we don't expect in a security core (tighten as needed).
deny = []

[licenses]
version = 2
# Permissive licenses only. The crypto stack is MIT / Apache-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.9

[sources]
# Only crates.io; no unvetted git or alternate registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
